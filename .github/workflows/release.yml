name: release

# Publishes to PyPI when a GitHub Release is published, via PyPI Trusted
# Publishing (OIDC) - no API token is stored anywhere. Configure the trusted
# publisher on PyPI once before the first release:
#   PyPI project: agentaudit
#   owner: worksOnMyFridge   repo: agent-audit
#   workflow: release.yml    environment: pypi
on:
  release:
    types: [published]

jobs:
  pypi-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build distributions
        run: |
          pip install build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
